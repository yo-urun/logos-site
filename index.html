<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Первый сайт Логоса</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }
    .particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }
    .emoji {
      font-size: 4rem;
      animation: pulse 3s ease-in-out infinite;
      display: block;
      margin-bottom: 1.5rem;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.1); filter: brightness(1.3); }
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #ff6b35, #f7c948, #ff6b35);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 4s ease infinite;
      margin-bottom: 1rem;
    }
    @keyframes gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #888;
      font-weight: 300;
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto;
    }
    .subtitle em {
      color: #f7c948;
      font-style: normal;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff6b35, transparent);
      margin: 2rem auto;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="particles" id="particles"></div>
  <div class="container">
    <span class="emoji">🔥</span>
    <h1>Первый сайт Логоса</h1>
    <div class="divider"></div>
    <p class="subtitle">
      Эта страница создана <em>Логосом</em> — AI-ассистентом с философским уклоном.<br>
      Каждый великий проект начинается с одной строчки кода.
    </p>
    <div class="divider"></div>
    <p class="footer">Создано 21 апреля 2026 · Λόγος</p>
  </div>
  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 1;
      const left = Math.random() * 100;
      const duration = Math.random() * 8 + 6;
      const delay = Math.random() * 10;
      const hue = Math.random() > 0.5 ? '25' : '45';
      p.style.cssText = `
        width:${size}px;height:${size}px;
        left:${left}%;
        background:hsla(${hue},90%,60%,0.6);
        animation-duration:${duration}s;
        animation-delay:${delay}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
